name: Continuous Integration
on:
  push:
    branches:
      - main

jobs:
  run_tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '25'

      - name: Install dependencies
        run: npm install

      - name: Start MongoDB
        uses: supercharge/mongodb-github-action@1.12.1
        with:
          mongodb-version: 7

      - name: lint test
        run: npm run lint

      - name: unit test
        run: npm run test:unit

      - name: Cypress.io
        uses: cypress-io/github-action@v7.1.9
        with:
          start: npm run start:test

#Deployment stage
  deploy:
    runs-on: ubuntu-latest
    needs: run_tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}


      - name: Zip and Push to S3
        run: |
          aws deploy push \
            --application-name farhia-code-deploy-app \
            --description "Revision for ${{ github.sha }}" \
            --ignore-hidden-files \
            --s3-location s3://acebook-project-s3-bucket/artifact.zip \
            --source .


      - name: Create CodeDeploy Deployment
        run: |
          aws deploy create-deployment \
            --application-name farhia-code-deploy-app \
            --deployment-group-name farhia-production \
            --s3-location bucket=acebook-project-s3-bucket,key=artifact.zip,bundleType=zip